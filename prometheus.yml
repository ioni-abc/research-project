global:
  scrape_interval: 5s # Check the health of the services every 5 seconds

scrape_configs:
  - job_name: 'microservices'
    static_configs:
      - targets: [
          'auth_service:8001', 
          'db_service:8002', 
          'payment_service:8003', 
          'order_service:8004'
        ]